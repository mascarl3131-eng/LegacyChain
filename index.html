/* =====================================================
   BASE.CSS — Reset, CSS Variables, Body, Scrollbar
   ===================================================== */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --void:         #F5F0E8;
  --teal:         #8B6914;
  --amber:        #6B2737;
  --violet:       #5C4A2A;
  --text:         #1C1410;
  --danger:       #9B2335;
  --glass:        rgba(139,105,20,0.06);
  --glass-border: rgba(139,105,20,0.18);

  /* Extended warm palette */
  --cream:        #F5F0E8;
  --ivory:        #FEFCF7;
  --gold:         #8B6914;
  --gold-light:   #C4A84F;
  --gold-pale:    #E8D9A0;
  --bordeaux:     #6B2737;
  --brown:        #1C1410;
  --brown-light:  #4A3728;
  --sand:         #D4C5A9;
  --sand-light:   #EDE5D4;
  --parchment:    #F5F0E8;
}

body {
  background: var(--cream);
  color: var(--brown);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  overflow-x: hidden;
  cursor: default;
}

/* Subtle parchment texture overlay */
body::before {
  content: '';
  position: fixed; top:0; left:0; width:100%; height:100%;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(139,105,20,.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(107,39,55,.03) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar       { width: 5px; }
::-webkit-scrollbar-track { background: var(--sand-light); }
::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 3px; }

/* ── Custom cursor ── */
#cursor, #cursor-trail { display: none; }

/* ── Background canvas ── */
canvas#bg { display: none; }

/* ── Animations ── */
@keyframes blink   { 0%,100% { opacity:1 } 50% { opacity:0 } }
@keyframes rotate  { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }
@keyframes shake   { 0%,100% { transform:translateX(0) } 25% { transform:translateX(-4px) } 75% { transform:translateX(4px) } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }

/* =====================================================
   PAGES.CSS — Page system, Onboarding, Landing
   ===================================================== */

/* ── Page system ── */
.page {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  overflow-y: auto; z-index: 1;
  display: none; opacity: 0;
  transition: opacity .6s;
}
.page.active { display: block; opacity: 1; }

/* ════════════════════════════════════════════════════
   ONBOARDING
   ════════════════════════════════════════════════════ */
#onboarding {
  z-index: 100;
  background: linear-gradient(135deg, #1C1410 0%, #2C1F14 50%, #1C1410 100%);
  display: flex; align-items: center;
  justify-content: center; flex-direction: column;
}
#onboarding.active { display: flex; }
#ob-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

#ob-text {
  position: relative; z-index: 2;
  text-align: center; font-family: 'Cinzel Decorative', serif;
}
#ob-text h1 {
  font-size: clamp(2rem,6vw,5rem);
  color: var(--gold-pale);
  text-shadow: 0 0 60px rgba(196,168,79,.3);
  letter-spacing: .15em;
}
#ob-text p {
  font-family: 'Cormorant Garamond', serif;
  color: rgba(232,217,160,.6);
  margin-top: 1rem; font-size: 1rem;
  font-style: italic;
}
#ob-skip {
  position: absolute; top: 2rem; right: 2rem; z-index: 10;
  background: transparent; border: 1px solid var(--sand);
  color: var(--gold); font-family: 'Cormorant Garamond', serif;
  font-size: .8rem; padding: .5rem 1rem; border-radius: 4px;
  cursor: pointer; letter-spacing: .1em; transition: background .3s;
}
#ob-skip:hover { background: var(--ivory); }

/* ════════════════════════════════════════════════════
   LANDING — full redesign
   ════════════════════════════════════════════════════ */
#landing {
  display: flex; flex-direction: column;
  min-height: 100vh; overflow-x: hidden;
  background: linear-gradient(180deg, #FEFCF7 0%, #F5F0E8 50%, #EDE5D4 100%);
  position: relative;
}
/* Decorative large ⬡ watermark */
#landing::before {
  content: '⬡';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(300px, 50vw, 500px);
  color: rgba(139,105,20,.028);
  pointer-events: none; z-index: 0;
  font-family: serif; line-height: 1;
  user-select: none;
}
#landing.active { display: flex; }

/* ── Hero ── */
.landing-hero {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 5rem 2rem 3rem;
  text-align: center;
  /* Decorative corner lines */
}

/* Top-left corner ornament */
.landing-hero::before {
  content: '';
  position: absolute; top: 3rem; left: 3rem;
  width: 60px; height: 60px;
  border-top: 1px solid rgba(139,105,20,.25);
  border-left: 1px solid rgba(139,105,20,.25);
  pointer-events: none;
}
/* Bottom-right corner ornament */
.landing-hero::after {
  content: '';
  position: absolute; bottom: 3rem; right: 3rem;
  width: 60px; height: 60px;
  border-bottom: 1px solid rgba(139,105,20,.25);
  border-right: 1px solid rgba(139,105,20,.25);
  pointer-events: none;
}

/* Eyebrow tag */
.landing-eyebrow {
  display: flex; align-items: center; gap: .6rem;
  font-size: .65rem; letter-spacing: .35em;
  color: var(--gold); opacity: .8;
  margin-bottom: 2rem;
  border: 1px solid rgba(139,105,20,.2);
  padding: .4rem 1rem; border-radius: 20px;
  background: rgba(139,105,20,.04);
}
.landing-eyebrow::before,
.landing-eyebrow::after { content: '✦'; font-size: .5rem; opacity: .6; }

/* Typewriter headline */
#typewriter {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2.2rem, 5.5vw, 4.5rem);
  color: var(--text);
  line-height: 1.15;
  min-height: 1.3em;
  text-shadow: 0 0 80px rgba(139,105,20,.15);
  letter-spacing: .02em;
}
#typewriter span {
  border-right: 2px solid var(--gold);
  animation: blink 1s infinite;
}

/* Subline */
.landing-sub {
  font-size: 1.05rem; color: var(--brown-light);
  margin: 1.75rem auto 2.75rem;
  max-width: 480px; line-height: 1.9;
  font-style: italic; font-weight: 300;
  opacity: .75;
}

/* ── Auth buttons — card style ── */
.auth-btns {
  display: flex; flex-direction: column; gap: .75rem;
  width: 100%; max-width: 380px; margin: 0 auto;
}

.btn-fb {
  display: flex; align-items: center; justify-content: center;
  gap: .85rem; padding: 1rem 1.5rem;
  background: #1877F2;
  border: none;
  border-radius: 10px; color: #ffffff;
  font-family: 'Cormorant Garamond', serif; font-size: .85rem;
  letter-spacing: .06em; cursor: pointer; transition: all .35s;
  position: relative; overflow: hidden;
}
.btn-fb:hover {
  background: #1469d6;
  box-shadow: 0 4px 20px rgba(24,119,242,.5);
  transform: translateY(-1px);
}
.btn-fb .fb-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center;
  justify-content: center; font-weight: 900;
  color: #ffffff; font-size: 1.1rem; flex-shrink: 0;
  font-family: Georgia, serif;
}

.btn-guest {
  background: transparent;
  border: 1px solid var(--sand);
  color: var(--brown-light); opacity: .65; padding: .8rem;
  border-radius: 10px; font-family: 'Cormorant Garamond', serif;
  font-size: .75rem; cursor: pointer; letter-spacing: .08em;
  transition: all .3s;
}
.btn-guest:hover {
  border-color: rgba(239,246,255,.25);
  color: var(--brown-light);
  background: rgba(239,246,255,.03);
}

/* ── Stats band ── */
.landing-stats {
  width: 100%; margin-top: 3.5rem;
  display: grid; grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--sand);
  border-bottom: 1px solid var(--sand);
}
.stat-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 1.5rem 1rem; gap: .3rem;
  border-right: 1px solid var(--sand);
  transition: background .3s;
}
.stat-item:last-child { border-right: none; }
.stat-item:hover { background: rgba(139,105,20,.03); }

.stat-number {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  color: var(--gold);
  text-shadow: none;
  line-height: 1;
}
.stat-label {
  font-size: .62rem; letter-spacing: .18em;
  color: var(--brown-light); opacity: .5;
  text-transform: uppercase; font-family: 'Cinzel', serif;
}

/* ── Features strip (3 pills under stats) ── */
.landing-features {
  display: flex; gap: 1rem; justify-content: center;
  flex-wrap: wrap; padding: 2rem 2rem 1rem;
  z-index: 2; position: relative;
}
.feature-pill {
  display: flex; align-items: center; gap: .5rem;
  font-size: .7rem; letter-spacing: .1em;
  color: var(--brown-light); opacity: .5;
  border: 1px solid var(--sand);
  padding: .45rem .9rem; border-radius: 20px;
  background: var(--ivory); backdrop-filter: blur(8px);
  transition: all .3s;
}
.feature-pill:hover {
  border-color: rgba(139,105,20,.3);
  color: var(--brown-light);
}
.feature-pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); opacity: .7; flex-shrink: 0;
}

/* ── Footer stamp ── */
.landing-footer-stamp {
  font-size: .6rem; letter-spacing: .25em;
  color: rgba(139,105,20,.2);
  text-align: center;
  padding: 1.5rem 2rem 2rem;
  z-index: 2; position: relative;
}

/* ── Responsive ── */
@media (max-width: 500px) {
  .landing-stats { grid-template-columns: 1fr; }
  .stat-item { border-right: none; border-bottom: 1px solid var(--sand); }
  .stat-item:last-child { border-bottom: none; }
  #typewriter { font-size: clamp(1.8rem, 8vw, 2.8rem); }
}

/* =====================================================
   NAV.CSS — Main app shell, navigation bar, tabs
   ===================================================== */

/* ── App container ── */
#app        { display: none; background: var(--cream); min-height: 100vh; }
#app.active { display: block; }

.app-content { padding-top: 65px; min-height: 100vh; }

.tab-content        { display: none; padding: 2.5rem; }
.tab-content.active { display: block; }

/* ── Navigation bar ── */
.app-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 65px;
  padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(254,252,247,.95);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--sand);
}

/* ── Logo ── */
.nav-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: .95rem; color: var(--gold); letter-spacing: .15em;
  flex-shrink: 0;
  text-shadow: none;
}

/* ── Tab group (center) ── */
.nav-tabs {
  display: flex; gap: .15rem;
  background: rgba(0,0,0,.2);
  border: 1px solid var(--sand);
  border-radius: 8px; padding: .25rem;
}

.nav-tab {
  background: transparent; border: none;
  color: rgba(239,246,255,.38);
  font-family: 'Cormorant Garamond', serif;
  font-size: .65rem; letter-spacing: .1em;
  padding: .45rem .7rem; border-radius: 5px;
  cursor: pointer; transition: all .25s;
  white-space: nowrap;
  position: relative;
}
.nav-tab:hover { color: var(--brown-light); background: rgba(255,255,255,.04); }
.nav-tab.active {
  color: var(--gold);
  background: rgba(139,105,20,.1);
  box-shadow: 0 0 12px rgba(139,105,20,.08);
}
/* Active tab indicator dot */
.nav-tab.active::after {
  content: '';
  position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
}

/* ── Right side ── */
.nav-right { display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }

.user-badge {
  display: flex; align-items: center; gap: .5rem;
  font-size: .72rem; color: rgba(239,246,255,.55);
  padding: .3rem .6rem;
  border: 1px solid transparent;
  border-radius: 20px;
  transition: all .3s;
}
.user-badge:hover {
  border-color: var(--glass-border);
  background: var(--ivory);
}

.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--violet));
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: var(--void);
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(139,105,20,.2);
}

.btn-invite {
  background: transparent;
  border: 1px solid rgba(139,105,20,.3);
  color: var(--gold); font-family: 'Cormorant Garamond', serif;
  font-size: .65rem; letter-spacing: .1em;
  padding: .45rem .9rem; border-radius: 6px;
  cursor: pointer; transition: all .3s;
}
.btn-invite:hover {
  background: rgba(139,105,20,.08);
  box-shadow: 0 0 14px rgba(139,105,20,.1);
}

.premium-badge {
  background: linear-gradient(135deg, var(--amber), #ff6b35);
  color: var(--void); font-size: .58rem; padding: .2rem .5rem;
  border-radius: 3px; font-weight: 700; letter-spacing: .1em;
}

/* ── Shared section headers ── */
.section-header { margin-bottom: 2rem; }

.section-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.1rem; color: var(--gold);
  letter-spacing: .15em; margin-bottom: .4rem;
}
.section-sub {
  font-size: .72rem; color: rgba(239,246,255,.35);
  letter-spacing: .1em;
}

/* ── Responsive: hide text labels, show icon pills on small screens ── */
@media (max-width: 900px) {
  .nav-tabs { gap: .1rem; padding: .2rem; }
  .nav-tab  { font-size: .6rem; padding: .4rem .5rem; letter-spacing: .05em; }
  .nav-tab.active::after { display: none; }
  #nav-name { display: none; }
}

@media (max-width: 680px) {
  .app-nav { padding: 0 1rem; }
  .tab-content { padding: 1.25rem; }
  /* Tabs wrap below nav on very small screens */
  .nav-tabs {
    position: fixed; bottom: 0; left: 0; right: 0; top: auto;
    border-radius: 0; border: none;
    border-top: 1px solid var(--sand);
    background: rgba(254,252,247,.98);
    padding: .4rem .5rem;
    justify-content: space-around;
    overflow-x: auto;
  }
  .app-nav { height: 55px; }
  .app-content { padding-top: 55px; padding-bottom: 60px; }
}

/* =====================================================
   CHAIN.CSS — Chain tab, compose panel, form elements
   ===================================================== */

/* ── Chain layout ── */
.chain-container { display: flex; gap: 2.5rem; align-items: flex-start; flex-wrap: wrap; }
.chain-scroll-wrap {
  flex: 1.4; min-width: 320px;
  height: 520px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--sand);
  border-radius: 12px;
  background: var(--sand-light);
  mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
  box-shadow: inset 0 2px 8px rgba(28,20,16,.06);
}
.chain-scroll-inner {
  display: flex;
  flex-direction: column;
  gap: .6rem;
  padding: 1.25rem;
  animation: chainScroll 32s linear infinite;
}
.chain-scroll-inner:hover { animation-play-state: paused; }
@keyframes chainScroll {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
.chain-compose-col { flex: 1; min-width: 300px; }

/* ── Timeline spine ── */
.timeline-spine {
  position: absolute; left: 19px; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom,
    rgba(139,105,20,.4) 0%,
    rgba(139,105,20,.15) 60%,
    transparent 100%);
}

/* ── Message nodes — alternating layout ── */
.msg-node {
  position: relative;
  margin-bottom: 2.5rem;
  padding-left: 52px;
  animation: fadeSlideIn .4s ease both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Year marker on the spine */
.msg-year-marker {
  position: absolute; left: 0; top: .6rem;
  display: flex; align-items: center; gap: 8px;
}
.msg-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--gold); background: var(--void);
  box-shadow: 0 0 12px rgba(139,105,20,.5);
  flex-shrink: 0; z-index: 1;
  transition: transform .2s;
}
.msg-node:hover .msg-dot { transform: scale(1.25); }

.msg-dot.hope    { border-color: var(--gold);   box-shadow: 0 0 12px rgba(139,105,20,.5); }
.msg-dot.love    { border-color: #ff6b9d;        box-shadow: 0 0 12px rgba(255,107,157,.5); }
.msg-dot.wisdom  { border-color: var(--violet);  box-shadow: 0 0 12px rgba(192,132,252,.5); }
.msg-dot.memory  { border-color: var(--amber);   box-shadow: 0 0 12px rgba(255,179,71,.5); }
.msg-dot.warning { border-color: var(--danger);  box-shadow: 0 0 12px rgba(255,45,85,.5); }

/* ── Message cards ── */
.msg-card {
  background: rgba(245,240,232,.8);
  border: 1px solid var(--sand);
  border-radius: 14px; padding: 1.4rem 1.5rem;
  backdrop-filter: blur(16px);
  transition: all .3s;
  position: relative; overflow: hidden;
}
/* Colored left accent bar */
.msg-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; bottom: 0; width: 3px;
  background: var(--gold); opacity: .5;
  border-radius: 14px 0 0 14px;
}
/* Top shimmer */
.msg-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: .25;
}
.msg-card:hover {
  border-color: rgba(139,105,20,.28);
  box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(139,105,20,.08);
  transform: translateY(-2px);
  background: rgba(139,105,20,.03);
}

/* Emotion-specific left bar + border */
.msg-card.hope   { border-color: rgba(139,105,20,.18); }
.msg-card.hope::before   { background: var(--gold); }
.msg-card.love   { border-color: rgba(255,107,157,.18); }
.msg-card.love::before   { background: #ff6b9d; }
.msg-card.love::after    { background: linear-gradient(90deg,transparent,#ff6b9d,transparent); }
.msg-card.wisdom { border-color: rgba(192,132,252,.18); }
.msg-card.wisdom::before { background: var(--violet); }
.msg-card.wisdom::after  { background: linear-gradient(90deg,transparent,var(--violet),transparent); }
.msg-card.memory { border-color: rgba(255,179,71,.18); }
.msg-card.memory::before { background: var(--amber); }
.msg-card.memory::after  { background: linear-gradient(90deg,transparent,var(--amber),transparent); }
.msg-card.warning { border-color: rgba(255,45,85,.18); }
.msg-card.warning::before { background: var(--danger); }
.msg-card.birth  { border-color: rgba(255,179,71,.35); background: rgba(255,179,71,.04); }

/* ── Card header ── */
.msg-meta {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: .9rem;
}
.msg-author-block { display: flex; align-items: center; gap: .5rem; }
.msg-author-init {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--violet));
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 700; color: var(--void);
  flex-shrink: 0;
}
.msg-author { font-size: .8rem; color: var(--text); letter-spacing: .05em; font-weight: 500; }
.msg-year   { font-size: .65rem; color: rgba(239,246,255,.25); letter-spacing: .08em; }

/* ── Message body ── */
.msg-text {
  font-size: .87rem; line-height: 1.75;
  color: rgba(239,246,255,.75);
  margin-bottom: .9rem;
}

/* ── Card footer ── */
.msg-footer {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: .5rem;
  padding-top: .75rem;
  border-top: 1px solid rgba(255,255,255,.05);
}
.msg-emotion {
  display: inline-flex; align-items: center; gap: .3rem;
  font-size: .6rem; letter-spacing: .12em;
  padding: .2rem .65rem; border-radius: 20px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--sand);
  color: var(--brown-light); opacity: .5;
}
.msg-emotion-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
}
.msg-card.love .msg-emotion-dot    { background: #ff6b9d; }
.msg-card.wisdom .msg-emotion-dot  { background: var(--violet); }
.msg-card.memory .msg-emotion-dot  { background: var(--amber); }
.msg-card.warning .msg-emotion-dot { background: var(--danger); }

.msg-actions { display: flex; gap: .4rem; }
.msg-btn {
  background: transparent; border: 1px solid rgba(255,255,255,.07);
  color: rgba(239,246,255,.35); font-family: 'Cormorant Garamond', serif;
  font-size: .62rem; padding: .3rem .65rem; border-radius: 5px;
  cursor: pointer; transition: all .25s; letter-spacing: .05em;
}
.msg-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(139,105,20,.05); }

/* Lock tag */
.msg-lock {
  font-size: .62rem; color: rgba(239,246,255,.25);
  letter-spacing: .08em; display: flex; align-items: center; gap: .3rem;
}

/* Birth / capsule badges */
.birth-badge {
  display: inline-flex; align-items: center; gap: .4rem;
  background: rgba(255,179,71,.08); border: 1px solid rgba(255,179,71,.25);
  color: var(--amber); font-size: .68rem; padding: .3rem .75rem;
  border-radius: 20px; margin-bottom: .75rem; letter-spacing: .05em;
}
.birth-delivery {
  font-size: .72rem; color: rgba(255,179,71,.6);
  margin-top: .4rem; font-style: italic; line-height: 1.6;
}

/* Empty state */
.chain-empty {
  text-align: center; padding: 4rem 2rem;
  color: var(--brown-light); opacity: .25;
}
.chain-empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: .4; }
.chain-empty-text { font-size: .8rem; letter-spacing: .1em; line-height: 1.8; }

/* ════════════════════════════════════════════════════
   COMPOSE PANEL
   ════════════════════════════════════════════════════ */
.compose-panel {
  background: rgba(245,240,232,.85);
  border: 1px solid var(--sand);
  border-radius: 16px; padding: 1.75rem;
  backdrop-filter: blur(24px);
  position: sticky; top: 80px;
}
.compose-panel-header {
  display: flex; align-items: center; gap: .6rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--sand);
}
.compose-panel-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(139,105,20,.1); border: 1px solid rgba(139,105,20,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
}
.compose-panel h3 {
  font-size: .75rem; letter-spacing: .2em;
  color: var(--gold); flex: 1;
}

/* Premium upsell card */
.premium-upsell {
  margin-top: 1rem;
  background: rgba(255,179,71,.04);
  border: 1px solid rgba(255,179,71,.2);
  border-radius: 12px; padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: .75rem;
  cursor: pointer; transition: all .3s;
}
.premium-upsell:hover {
  background: rgba(255,179,71,.08);
  border-color: rgba(255,179,71,.35);
}
.premium-upsell-icon { font-size: 1.1rem; flex-shrink: 0; }
.premium-upsell-text { flex: 1; }
.premium-upsell-title {
  font-size: .72rem; color: var(--amber); letter-spacing: .1em; font-weight: 500;
}
.premium-upsell-sub {
  font-size: .62rem; color: rgba(255,179,71,.45); margin-top: .2rem; letter-spacing: .05em;
}
.premium-upsell-arrow {
  font-size: .8rem; color: rgba(255,179,71,.4); flex-shrink: 0;
}

/* ════════════════════════════════════════════════════
   FORM ELEMENTS (shared across tabs)
   ════════════════════════════════════════════════════ */
.form-group       { margin-bottom: 1.1rem; }
.form-group label {
  display: block; font-size: .67rem;
  color: var(--brown-light); opacity: .5; letter-spacing: .12em;
  margin-bottom: .45rem; text-transform: uppercase;
}

.form-input,
.form-textarea,
.form-select {
  width: 100%;
  background: rgba(245,240,232,.75);
  border: 1px solid rgba(255,255,255,.08);
  color: var(--text); font-family: 'Cormorant Garamond', serif;
  font-size: .82rem; padding: .65rem .9rem;
  border-radius: 8px; outline: none;
  transition: border-color .25s, box-shadow .25s;
}
.form-input:focus,
.form-textarea:focus,
.form-select:focus {
  border-color: rgba(139,105,20,.4);
  box-shadow: 0 0 0 3px rgba(139,105,20,.06);
}
.form-input::placeholder,
.form-textarea::placeholder { color: rgba(239,246,255,.18); }
.form-select option { background: var(--ivory); }
.form-textarea { resize: vertical; min-height: 100px; line-height: 1.65; }

/* Emotion picker */
.emotion-picker { display: flex; gap: .4rem; flex-wrap: wrap; }
.emotion-btn {
  background: transparent; border: 1px solid rgba(255,255,255,.08);
  color: var(--brown-light); opacity: .5; font-family: 'Cormorant Garamond', serif;
  font-size: .62rem; padding: .32rem .75rem; border-radius: 20px;
  cursor: pointer; transition: all .25s; letter-spacing: .06em;
}
.emotion-btn:hover { border-color: var(--glass-border); color: var(--brown-light); }
.emotion-btn.selected,
.emotion-btn.hope.selected     { border-color: var(--gold);   color: var(--gold);   background: rgba(139,105,20,.08); }
.emotion-btn.love.selected     { border-color: #ff6b9d;        color: #ff6b9d;        background: rgba(255,107,157,.08); }
.emotion-btn.wisdom.selected   { border-color: var(--violet);  color: var(--violet);  background: rgba(192,132,252,.08); }
.emotion-btn.memory.selected   { border-color: var(--amber);   color: var(--amber);   background: rgba(255,179,71,.08); }
.emotion-btn.warning.selected  { border-color: var(--danger);  color: var(--danger);  background: rgba(255,45,85,.08); }

/* Char counter */
.char-count { text-align: right; font-size: .62rem; color: rgba(239,246,255,.25); margin-top: .35rem; }

/* Submit button */
.btn-submit {
  width: 100%; padding: .85rem;
  background: linear-gradient(135deg, #8B6914, #A07820);
  border: none; color: #FEFCF7;
  font-family: 'Cinzel', serif; font-size: .72rem;
  letter-spacing: .2em; border-radius: 8px;
  cursor: pointer; transition: all .3s; margin-top: .5rem;
  box-shadow: 0 2px 8px rgba(139,105,20,.25);
}
.btn-submit::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(139,105,20,.08), transparent);
  transition: left .5s;
}
.btn-submit:hover::before { left: 100%; }
.btn-submit:hover {
  background: linear-gradient(135deg, #A07820, #8B6914);
  box-shadow: 0 4px 16px rgba(139,105,20,.4);
  transform: translateY(-1px);
}

/* Moderation warning */
.moderation-warning {
  background: rgba(255,45,85,.06);
  border: 1px solid rgba(255,45,85,.25);
  color: var(--danger); font-size: .75rem; padding: .9rem 1rem;
  border-radius: 8px; margin-top: .75rem;
  display: none; line-height: 1.6; text-align: center;
}

/* Shake animation */
.shake { animation: shake .4s; }

/* Submit overlay */
.submit-anim {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 200; display: none;
  align-items: center; justify-content: center;
  background: rgba(28,20,16,.92);
}
.submit-anim.show { display: flex; }
#submit-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.submit-text {
  position: relative; z-index: 1; text-align: center;
  font-family: 'Cinzel Decorative', serif; color: var(--gold);
  font-size: 1.1rem; text-shadow: 0 0 30px rgba(139,105,20,.5);
  letter-spacing: .1em;
}

/* Responsive */
@media (max-width: 700px) {
  .chain-container { flex-direction: column; }
  .compose-panel   { position: static; }
}

/* =====================================================
   TABS.CSS — Tree, Humanity, Book of Life,
              Challenges, Origins, Modals
   ===================================================== */

/* =====================================================
   TREE TAB
   ===================================================== */
#tree-svg-container {
  width: 100%; overflow-x: auto;
  background: var(--ivory); border: 1px solid var(--sand);
  border-radius: 16px; padding: 1rem;
}
.tree-node           { cursor: pointer; transition: all .3s; }
.tree-node:hover circle { filter: brightness(1.3); }

.add-member-btn {
  margin-top: 1rem; background: transparent;
  border: 1px solid var(--sand); color: var(--brown-light);
  font-family: 'Cinzel', serif; font-size: .7rem;
  padding: .6rem 1.2rem; border-radius: 6px;
  cursor: pointer; letter-spacing: .1em; transition: all .3s;
}
.add-member-btn:hover { border-color: var(--gold); color: var(--gold); }

.member-panel {
  background: var(--ivory); border: 1px solid var(--sand);
  border-radius: 12px; padding: 1.25rem; margin-top: 1rem; display: none;
}
.member-panel.visible { display: block; }
.member-panel h4      { font-size: .8rem; color: var(--gold); letter-spacing: .15em; margin-bottom: 1rem; }

/* =====================================================
   HUMANITY TAB
   ===================================================== */
.humanity-hero {
  text-align: center; padding: 3rem 1rem 2rem;
  border-bottom: 1px solid var(--sand); margin-bottom: 2rem;
}
.humanity-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.5rem,4vw,3rem); color: var(--brown);
  letter-spacing: .1em; margin-bottom: .75rem;
}
.humanity-sub {
  font-size: .95rem; color: var(--brown-light);
  max-width: 600px; margin: 0 auto 1.5rem;
  font-style: italic;
}
.globe-placeholder {
  width: 200px; height: 200px; border-radius: 50%;
  margin: 0 auto 1.5rem; position: relative;
  overflow: hidden; border: 1px solid rgba(139,105,20,.2);
}
.globe-placeholder canvas { width: 100%; height: 100%; }

/* Typewriter block */
.typewriter-block {
  background: var(--ivory); border: 1px solid var(--sand);
  border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;
  text-align: center; backdrop-filter: blur(10px);
}
.typewriter-label { font-size: .65rem; color: rgba(139,105,20,.5); letter-spacing: .2em; margin-bottom: 1rem; }
.tw-country       { font-size: .7rem; color: rgba(139,105,20,.6); letter-spacing: .1em; margin-bottom: .5rem; }
.tw-text          { font-size: .9rem; color: rgba(239,246,255,.85); line-height: 1.8; min-height: 3em; }
#tw-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--gold); vertical-align: middle; animation: blink 1s infinite;
}

.btn-write {
  background: transparent; border: none;
  color: rgba(139,105,20,.5); font-family: 'Cormorant Garamond', serif;
  font-size: .7rem; letter-spacing: .1em; cursor: pointer;
  margin-top: .75rem; text-decoration: underline;
  text-underline-offset: 3px; transition: color .3s;
}
.btn-write:hover { color: var(--gold); }

/* Columns */
.humanity-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
@media (max-width: 700px) { .humanity-cols { grid-template-columns: 1fr; } }

.wall-title  { font-size: .7rem; letter-spacing: .2em; color: var(--brown-light); margin-bottom: 1rem; }
.masonry-wall { columns: 1; gap: 1rem; }

/* Voice cards */
.voice-card {
  background: var(--ivory); border: 1px solid var(--sand);
  border-radius: 8px; padding: 1rem; margin-bottom: 1rem;
  break-inside: avoid; transition: all .3s; position: relative; overflow: hidden;
  box-shadow: 0 1px 4px rgba(28,20,16,.06);
}
.voice-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; opacity: .6; }
.voice-card.hope::before    { background: var(--gold); }
.voice-card.wisdom::before  { background: var(--violet); }
.voice-card.love::before    { background: #ff6b9d; }
.voice-card.memory::before  { background: var(--amber); }
.voice-card.warning::before { background: var(--danger); }
.voice-card.peace::before   { background: #7dd3fc; }
.voice-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.3); }

.voice-flag   { position: absolute; top: .75rem; right: .75rem; font-size: 1rem; }
.voice-author { font-size: .7rem; color: rgba(139,105,20,.7); letter-spacing: .1em; margin-bottom: .4rem; }
.voice-text   { font-size: .8rem; line-height: 1.7; color: var(--brown); }
.voice-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; }
.voice-emotion {
  font-size: .6rem; letter-spacing: .1em; color: var(--brown-light); opacity: .35;
  border: 1px solid var(--sand); padding: .15rem .5rem; border-radius: 3px;
}
.voice-like {
  background: transparent; border: none;
  color: var(--brown-light); opacity: .35; font-family: 'Cormorant Garamond', serif;
  font-size: .7rem; cursor: pointer; transition: all .3s;
}
.voice-like:hover,
.voice-like.liked { color: #ff6b9d; }

.translate-badge { display: inline-block; font-size: .6rem; color: var(--brown-light); opacity: .35; margin-top: .3rem; letter-spacing: .05em; }

/* =====================================================
   BOOK OF LIFE TAB
   ===================================================== */
.stepper       { display: flex; gap: .5rem; margin-bottom: 2rem; flex-wrap: wrap; }
.step-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--sand); color: var(--brown-light); opacity: .35;
  font-family: 'Cinzel', serif; font-size: .65rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .3s;
}
.step-dot.done   { border-color: var(--gold); color: var(--gold); background: rgba(139,105,20,.1); }
.step-dot.active { border-color: var(--gold); color: var(--void); background: var(--gold); }

.progress-bar  { height: 2px; background: var(--sand); border-radius: 1px; margin-bottom: 2rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gold); transition: width .5s; box-shadow: 0 0 8px rgba(139,105,20,.5); }

.chapter        { display: none; }
.chapter.active { display: block; }
.chapter-title  { font-family: 'Cinzel Decorative', serif; font-size: 1rem; color: var(--gold); margin-bottom: .5rem; letter-spacing: .1em; }
.chapter-sub    { font-size: .75rem; color: var(--brown-light); opacity: .5; margin-bottom: 1.5rem; line-height: 1.7; }

.step-btns { display: flex; gap: 1rem; margin-top: 1.5rem; }
.btn-next, .btn-prev {
  flex: 1; padding: .75rem; background: transparent;
  font-family: 'Cinzel', serif; font-size: .7rem;
  letter-spacing: .15em; border-radius: 6px; cursor: pointer; transition: all .3s;
}
.btn-next { border: 1px solid var(--gold); color: var(--gold); }
.btn-next:hover { background: rgba(139,105,20,.1); }
.btn-prev { border: 1px solid var(--sand); color: var(--brown-light); opacity: .5; }
.btn-prev:hover { border-color: var(--brown-light); opacity: .35; color: var(--text); }

/* =====================================================
   CHALLENGES TAB
   ===================================================== */
.challenge-card {
  background: var(--ivory); border: 1px solid var(--sand);
  border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem;
  box-shadow: 0 1px 6px rgba(28,20,16,.06);
}
.challenge-q { font-size: 1rem; color: var(--brown); margin-bottom: 1rem; line-height: 1.65; font-style: italic; }

.decade-label  { font-size: .65rem; letter-spacing: .2em; padding: .2rem .6rem; border-radius: 3px; display: inline-block; margin-bottom: .5rem; }
.decade-2020s  { background: rgba(139,105,20,.1);   color: var(--gold);   border: 1px solid rgba(139,105,20,.2); }
.decade-2030s  { background: rgba(192,132,252,.1); color: var(--violet); border: 1px solid rgba(192,132,252,.2); }
.decade-2040s  { background: rgba(255,179,71,.1);  color: var(--amber);  border: 1px solid rgba(255,179,71,.2); }

.answer-item   { padding: .75rem 0; border-top: 1px solid var(--sand); }
.answer-author { font-size: .7rem; color: var(--brown-light); opacity: .5; margin-bottom: .3rem; }
.answer-text   { font-size: .82rem; line-height: 1.6; color: var(--brown); }

.btn-answer {
  background: transparent; border: 1px solid var(--sand);
  color: var(--brown-light); font-family: 'Cormorant Garamond', serif;
  font-size: .7rem; padding: .4rem .8rem; border-radius: 4px;
  cursor: pointer; margin-top: .75rem; transition: all .3s; letter-spacing: .1em;
}
.btn-answer:hover { border-color: var(--gold); color: var(--gold); }

.answer-form      { margin-top: .75rem; display: none; }
.answer-form.open { display: block; }

/* =====================================================
   ORIGINS TAB
   ===================================================== */
.dna-warning {
  border: 1px solid rgba(107,39,55,.25); background: rgba(107,39,55,.04);
  border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem;
  font-size: .82rem; line-height: 1.75; color: var(--brown-light);
}
.dna-warning strong { color: var(--bordeaux); display: block; margin-bottom: .3rem; font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .08em; }

.origins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 600px) { .origins-grid { grid-template-columns: 1fr; } }

.origin-row                   { display: flex; gap: .5rem; align-items: center; margin-bottom: .5rem; }
.origin-row input[type=text]  { flex: 1; }
.origin-row input[type=number]{ width: 70px; }

.total-bar  { margin-top: 1rem; padding: .75rem; border-radius: 6px; font-size: .75rem; letter-spacing: .1em; transition: all .3s; text-align: center; }
.total-ok   { background: rgba(139,105,20,.08);  border: 1px solid rgba(139,105,20,.2);  color: var(--gold); }
.total-low  { background: rgba(255,179,71,.08); border: 1px solid rgba(255,179,71,.2); color: var(--amber); }
.total-over { background: rgba(255,45,85,.08);  border: 1px solid rgba(255,45,85,.2);  color: var(--danger); }

/* ── Family Pact ── */
.pacte-card {
  background: linear-gradient(135deg, rgba(139,105,20,.05), rgba(192,132,252,.05));
  border: 1px solid rgba(139,105,20,.2); border-radius: 16px;
  padding: 2rem; text-align: center; margin-top: 2rem;
}
.pacte-text    { font-style: italic; font-size: .85rem; line-height: 1.9; color: var(--brown-light); margin-bottom: 1.5rem; }
.pacte-signers { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
.signer {
  font-size: .7rem; color: var(--gold);
  background: rgba(139,105,20,.1); border: 1px solid rgba(139,105,20,.2);
  padding: .3rem .7rem; border-radius: 20px;
  display: flex; align-items: center; gap: .3rem;
}

/* =====================================================
   MODALS — Immersive, Invite, Upgrade
   ==
